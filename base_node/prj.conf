# ---------------------------------------------------------------
# Home Security Base Node – prj.conf
# ---------------------------------------------------------------

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_SENSOR_NODE=y

# -------- Serial Console via UART --------
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y

# -------- Disable incompatible backends --------
CONFIG_RTT_CONSOLE=n
CONFIG_USB_DEVICE_STACK=n

