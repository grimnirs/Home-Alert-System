# ---------------------------------------------------------------
# Home Security Base Node – prj.conf
# ---------------------------------------------------------------

# --- Core ---
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# --- GPIO (for LED) ---
CONFIG_GPIO=y

# --- UART (interrupt-driven for frame reception) ---
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Sensor subsystem ---
CONFIG_SENSOR=y

# --- Our custom driver ---
CONFIG_SENSOR_NODE=y
