# ---------------------------------------------------------------
# Home Security Base Node – prj.conf
# ---------------------------------------------------------------

CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_GPIO=y
CONFIG_SENSOR=y
CONFIG_SENSOR_NODE=y

# ---------------- USB ----------------
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

CONFIG_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_RTT_CONSOLE=n